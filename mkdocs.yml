site_name: mp-commons
site_description: Python shared kernel and commons library for microservices
site_url: https://github.com/marcusPrado02/python-commons
repo_url: https://github.com/marcusPrado02/python-commons
repo_name: mp-commons

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source

watch:
  - src/mp_commons

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Guides:
    - Quickstart: guides/quickstart.md
    - Adapters: guides/adapters.md
    - Migration to v1: guides/migration-v1.md
    - Troubleshooting: guides/troubleshooting.md
  - Adapters:
    - Redis: adapters/redis.md
    - Kafka: adapters/kafka.md
    - PostgreSQL: adapters/postgresql.md
    - Elasticsearch: adapters/elasticsearch.md
    - S3: adapters/s3.md
    - MongoDB: adapters/mongodb.md
  - Architecture:
    - Diagrams: architecture/diagrams.md
    - ADR-0001 Kernel Boundaries: architecture/ADR-0001-kernel-boundaries.md
    - ADR-0002 Outbox/Inbox Idempotency: architecture/ADR-0002-outbox-inbox-idempotency.md
    - ADR-0003 Ports and Adapters: architecture/ADR-0003-ports-and-adapters.md
    - ADR-0004 Async First: architecture/ADR-0004-async-first.md
    - ADR-0005 Optional Extras: architecture/ADR-0005-optional-extras.md
    - ADR-0006 Result Type: architecture/ADR-0006-result-type.md
    - ADR-0007 Multi-Tenancy: architecture/ADR-0007-multi-tenancy.md
    - ADR-0008 Event Sourcing: architecture/ADR-0008-event-sourcing.md
  - Observability:
    - Logging Contract: observability/logging-contract.md
  - Security:
    - Threat Model: security/threat-model.md
    - PII Redaction: security/pii-redaction.md
  - Contracts:
    - OpenAPI Compatibility: contracts/openapi-compatibility.md
  - Versioning:
    - Semantic Versioning: versioning/semantic-versioning.md
  - API Reference:
    - Kernel: api/kernel.md
    - Application: api/application.md
    - Config: api/config.md
    - Observability: api/observability.md
    - Security: api/security.md
    - Testing: api/testing.md
