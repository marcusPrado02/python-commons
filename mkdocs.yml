site_name: mp-commons
site_description: Python shared kernel and commons library for microservices
site_url: https://github.com/marcusPrado02/python-commons
repo_url: https://github.com/marcusPrado02/python-commons
repo_name: mp-commons

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source

watch:
  - src/mp_commons

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Guides:
    - Quickstart: guides/quickstart.md
    - Adapters: guides/adapters.md
  - Architecture:
    - Diagrams: architecture/diagrams.md
    - Decisions: architecture/index.md
  - API Reference:
    - Kernel: api/kernel.md
    - Application: api/application.md
    - Config: api/config.md
    - Observability: api/observability.md
    - Security: api/security.md
    - Testing: api/testing.md
