name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels:
      - 'feat'
      - 'feature'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
  - title: '💥 Breaking Changes'
    labels:
      - 'breaking'
      - 'breaking-change'
  - title: '🧪 Tests'
    labels:
      - 'test'
      - 'tests'
  - title: '🔧 Maintenance & Chores'
    labels:
      - 'chore'
      - 'maintenance'
      - 'ci'
      - 'dependencies'
  - title: '📚 Documentation'
    labels:
      - 'docs'
      - 'documentation'
  - title: '⚡ Performance'
    labels:
      - 'performance'
      - 'perf'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - 'breaking'
      - 'breaking-change'
  minor:
    labels:
      - 'feat'
      - 'feature'
  patch:
    labels:
      - 'fix'
      - 'bugfix'
      - 'chore'
      - 'docs'
      - 'test'
      - 'dependencies'
      - 'ci'
  default: patch

template: |
  ## Changes

  $CHANGES

  ---
  *Full Changelog*: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
