# ---------------------------------------------------------------------------
# Adapter/infrastructure source modules — relax strict checking
# These modules use optional external packages, complex generics, and the
# lazy _require_X() pattern. ignore_missing_imports above handles import
# errors; these settings silence remaining strict-mode violations.
# ---------------------------------------------------------------------------
[mypy-mp_commons.adapters.*]
warn_unused_ignores = False
warn_return_any = False
disallow_untyped_defs = False
disallow_untyped_calls = False
disallow_any_generics = False

