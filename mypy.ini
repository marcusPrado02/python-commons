# ---------------------------------------------------------------------------
# Two-level wildcards: cover modules four components deep
# (e.g. mp_commons.observability.health.builtin).
# mypy's * in per-module patterns does not cross dot boundaries, so
# mp_commons.observability.* only matches three-component paths.
# ---------------------------------------------------------------------------
[mypy-mp_commons.adapters.*.*]
warn_unused_ignores = False
warn_return_any = False
disallow_untyped_defs = False
disallow_untyped_calls = False
disallow_any_generics = False

[mypy-mp_commons.application.*.*]
warn_unused_ignores = False
warn_return_any = False
disallow_untyped_defs = False
disallow_untyped_calls = False
disallow_any_generics = False

