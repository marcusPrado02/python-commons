line-length = 100
target-version = "py312"

[lint]
select = [
  "E", "W",     # pycodestyle
  "F",          # pyflakes
  "I",          # isort
  "UP",         # pyupgrade
  "B",          # flake8-bugbear
  "C4",         # flake8-comprehensions
  "SIM",        # flake8-simplify
  "TCH",        # flake8-type-checking
  "RUF",        # ruff-specific
  "ANN",        # flake8-annotations
  "PT",         # flake8-pytest-style
  "S",          # bandit (security)
  "PIE",        # misc lints
  "ERA",        # eradicate (commented-out code)
  "PL",         # pylint
  "PERF",       # perflint
]

ignore = [
  "S101",    # use of assert (needed in tests + invariants)
  "PLR0913", # too many arguments – fine for rich constructors
  "PLR2004", # magic value in comparison
  # intentional patterns throughout the codebase
  "ANN401",  # Any return type – used by _require_X() lazy-import helpers
  "PLC0415", # import not at top-level – intentional for lazy optional imports
  "RUF002",  # en dash in docstring – stylistic choice
  # type-checking imports: moving to TYPE_CHECKING can break runtime access
  "TC001", "TC002", "TC003",
  # modernisation deferred to a dedicated cleanup PR
  "UP046",   # Generic[T] subclass vs new-style type params (py312)
  "S110",    # try/except/pass – used intentionally in some adapters
  "SIM105",  # use contextlib.suppress – minor style, deferred
  # line length – already configured at 100; historical violations pre-date linting
  "E501",
  # ambiguous characters in comments/strings (same category as RUF002)
  "RUF001", "RUF003",
  # false-positive SQL injection: table/pk names set at construction time, not from user input
  "S608",
  # ERA001 fires on template/section-header comments that look like commented code
  "ERA001",
  # match-statement inline returns and similar concise patterns
  "E701",
  # abstract marker classes (Saga, etc.) use ABCMeta without abstract methods by design
  "B024",
  # complex converter/parser functions legitimately have many return paths
  "PLR0911",
  # type annotations on decorator wrappers and similar dynamic constructs
  "ANN001", "ANN201", "ANN202", "ANN205",
  # perf suggestions deferred to cleanup PR
  "PERF401", "PERF402",
  # simplify-if suggestions deferred
  "SIM102", "SIM108",
]

[lint.per-file-ignores]
"tests/**" = [
  "S", "ANN", "PLR",
  "PT011",   # pytest.raises without match= is acceptable in broad test cases
  "PT012",   # multiple statements in pytest.raises block — common pattern
  "B017",    # pytest.raises(Exception) used intentionally for generic error tests
  "SIM117",  # nested with statements — ok in tests for clarity
  "E402",    # module imports after module-level setup (fixtures, testcontainers)
  "RUF043",  # regex metacharacters in match= — intentional string matches
  "RUF006",  # asyncio.create_task reference — background tasks in tests
  "PT028",   # default argument on test param — used with respx_mock and similar
  "SIM115",  # open() without context manager in simple test helpers
  "E741",    # ambiguous variable names (l, O) — acceptable in test loops
]
"src/mp_commons/testing/**" = ["S", "ANN"]

[lint.isort]
known-first-party = ["mp_commons"]
force-sort-within-sections = true

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
